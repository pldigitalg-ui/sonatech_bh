<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iPhone 11 | Sonatech</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#fff;color:#111}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  padding:60px;
}

/* IMAGEM */
.img-produto img{
  width:100%;
  border-radius:10px;
}

/* INFO */
.info h1{
  font-size:32px;
}

.price{
  font-size:26px;
  color:#007aff;
  margin:15px 0;
}

/* VARIAÇÕES */
.variacoes{
  display:flex;
  gap:10px;
  margin:20px 0;
}

.variacoes button{
  padding:10px 15px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.variacoes button.active{
  border:2px solid #007aff;
}

/* URGÊNCIA */
.urgencia{
  color:red;
  font-weight:bold;
  margin:15px 0;
}

/* BOTÃO FIXO */
.buy{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#007aff;
  color:#fff;
  text-align:center;
  padding:20px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="img-produto">
    <img src="iphone11.jpg" id="imgPrincipal">
  </div>

  <div class="info">
    <h1>iPhone 11 128GB</h1>

    <div class="price">R$ 1.999</div>

    <div class="variacoes">
      <button onclick="selecionar(this,'Preto')">Preto</button>
      <button onclick="selecionar(this,'Branco')">Branco</button>
      <button onclick="selecionar(this,'Vermelho')">Vermelho</button>
    </div>

    <div class="urgencia" id="urgencia"></div>

    <p>
      Aparelho original, testado, com garantia.
      Ideal para uso diário com desempenho rápido.
    </p>

  </div>

</div>

<div class="buy" onclick="comprar()">COMPRAR AGORA NO WHATSAPP</div>

<script>
let corSelecionada = "Preto"

// selecionar cor
function selecionar(btn, cor){
  document.querySelectorAll(".variacoes button")
    .forEach(b=>b.classList.remove("active"))

  btn.classList.add("active")
  corSelecionada = cor
}

// urgência fake dinâmica
let estoque = Math.floor(Math.random()*5)+1
document.getElementById("urgencia").innerText = 
  "⚠️ Restam apenas " + estoque + " unidades"

// whatsapp
function comprar(){
  let msg = `Quero comprar:%0A`
  msg += `iPhone 11%0A`
  msg += `Cor: ${corSelecionada}`

  window.open(`https://wa.me/553183209688?text=${msg}`)
}
</script>

</body>
</html>
