<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu Cell Acessórios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:#fff;color:#111;overflow-x:hidden}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 40px;
  background:#fff;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-weight:700;
  font-size:20px;
  color:#007aff;
}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  text-decoration:none;
  color:#333;
  font-weight:500;
  transition:.3s;
}

.menu a:hover{
  color:#007aff;
}

/* HERO */
.hero{
  height:90vh;
  background:url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9') center/cover;
  display:flex;
  align-items:center;
  padding:0 60px;
}

.hero-content{
  max-width:500px;
}

.hero h1{
  font-size:48px;
  font-weight:700;
}

.hero p{
  margin:15px 0;
  color:#555;
}

.btn{
  background:#007aff;
  color:#fff;
  padding:15px 25px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  transition:.3s;
}

.btn:hover{
  background:#005ecb;
  transform:scale(1.05);
}

/* PRODUTOS */
.produtos{
  padding:60px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:30px;
}

.card{
  border:1px solid #eee;
  padding:20px;
  border-radius:10px;
  text-align:center;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  height:180px;
  object-fit:contain;
}

.card h3{
  font-size:16px;
  margin:10px 0;
}

.price{
  font-weight:bold;
  color:#007aff;
}

.card button{
  margin-top:10px;
  background:#111;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* WHATS */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0b5cff;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* VOLTAR TOPO */
.topo{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#111;
  color:#fff;
  padding:10px 14px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Seu Cell</div>

  <nav class="menu">
    <a href="#">Todos</a>
    <a href="#">Celulares</a>
    <a href="#">Capinhas</a>
    <a href="#">Películas</a>
    <a href="#">Carregadores</a>
    <a href="#">Fones</a>
    <a href="#">Caixa de Som</a>
    <a href="#">Utilidades</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Seu celular novo começa aqui</h1>
    <p>Qualidade, preço e entrega rápida direto no WhatsApp</p>
    <a href="#" class="btn" onclick="abrirWhats()">Comprar agora</a>
  </div>
</section>

<section class="produtos">
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb">
      <h3>iPhone 11 128GB</h3>
      <div class="price">R$ 1.999</div>
      <button onclick="add('iPhone 11',1999)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
      <h3>Capinha Premium</h3>
      <div class="price">R$ 29</div>
      <button onclick="add('Capinha',29)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552262b8b">
      <h3>Fone Bluetooth</h3>
      <div class="price">R$ 89</div>
      <button onclick="add('Fone',89)">Comprar</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90">
      <h3>Garrafa Térmica</h3>
      <div class="price">R$ 49</div>
      <button onclick="add('Garrafa',49)">Comprar</button>
    </div>

  </div>
</section>

<div class="whatsapp" onclick="abrirWhats()">💬</div>
<div class="topo" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
let carrinho = []

function add(nome, preco){
  carrinho.push({nome,preco})
  alert("Adicionado ao carrinho")
}

function abrirWhats(){
  let msg = "Pedido:%0A"

  carrinho.forEach(item=>{
    msg += `- ${item.nome} R$${item.preco}%0A`
  })

  window.open(`https://wa.me/553183209688?text=${msg}`)
}
</script>

</body>
</html>
