<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sonatech | Celulares e Acessórios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter}
body{background:#fff;color:#111}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  border-bottom:1px solid #eee;
  z-index:999;
}

.logo{font-weight:700;color:#007aff;font-size:20px}

.menu{
  display:flex;
  gap:25px;
}

.menu a{
  text-decoration:none;
  color:#444;
  font-weight:500;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  background:url('hero.jpg') center/cover;
  display:flex;
  align-items:center;
  padding:0 60px;
}

.hero h1{font-size:48px}
.hero p{margin:15px 0}

.btn{
  background:#007aff;
  color:#fff;
  padding:15px 25px;
  border-radius:30px;
  cursor:pointer;
}

/* SEÇÕES */
.section{
  padding:100px 50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  border:1px solid #eee;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:160px;
  object-fit:contain;
}

/* MODAL LATERAL */
.modal{
  position:fixed;
  top:0;
  right:-400px;
  width:350px;
  height:100%;
  background:#fff;
  box-shadow:-5px 0 20px rgba(0,0,0,0.1);
  transition:.4s;
  padding:20px;
  z-index:9999;
}

.modal.active{
  right:0;
}

.modal img{
  width:100%;
  margin-bottom:10px;
}

.modal input, .modal select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* BOTÕES */
.btn-whats{
  background:#0b5cff;
  color:#fff;
  padding:12px;
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  border-radius:8px;
}

/* FLOAT */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#0b5cff;
  color:#fff;
  padding:16px;
  border-radius:50%;
  font-size:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.topo{
  position:fixed;
  bottom:90px;
  right:20px;
  background:#111;
  color:#fff;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">Sonatech</div>

  <nav class="menu">
    <a onclick="scrollToSection('celulares')">Celulares</a>
    <a onclick="scrollToSection('capinhas')">Capinhas</a>
    <a onclick="scrollToSection('peliculas')">Películas</a>
    <a onclick="scrollToSection('carregadores')">Carregadores</a>
    <a onclick="scrollToSection('utilidades')">Utilidades</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Seu celular novo começa aqui</h1>
    <p>Entrega rápida direto no WhatsApp</p>
    <div class="btn" onclick="scrollToSection('celulares')">Ver produtos</div>
  </div>
</section>

<!-- CELULARES -->
<section id="celulares" class="section">
  <h2>Celulares</h2>
  <div class="grid">

    <div class="card" onclick="abrirModal('iPhone 11','iphone11.jpg','128GB, ótimo estado',1999)">
      <img src="iphone11.jpg">
      <p>iPhone 11</p>
    </div>

    <div class="card" onclick="abrirModal('Xiaomi 12','xiaomi12.jpg','128GB, rápido',1799)">
      <img src="xiaomi12.jpg">
      <p>Xiaomi 12</p>
    </div>

  </div>
</section>

<!-- CAPINHAS -->
<section id="capinhas" class="section">
  <h2>Capinhas</h2>
  <div class="grid">

    <div class="card" onclick="abrirModal('Capinha Premium','capinha1.jpg','Proteção total',29)">
      <img src="capinha1.jpg">
      <p>Capinha Premium</p>
    </div>

  </div>
</section>

<!-- UTILIDADES -->
<section id="utilidades" class="section">
  <h2>Utilidades</h2>
  <div class="grid">

    <div class="card" onclick="abrirModal('Fone Bluetooth','fone1.jpg','Alta qualidade',89)">
      <img src="fone1.jpg">
      <p>Fone Bluetooth</p>
    </div>

  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <img id="modalImg">
  <h3 id="modalNome"></h3>
  <p id="modalDesc"></p>

  <input type="text" id="nome" placeholder="Seu nome">
  <input type="text" id="endereco" placeholder="Endereço">

  <select id="pagamento">
    <option>PIX</option>
    <option>Crédito</option>
    <option>Débito</option>
  </select>

  <div class="btn-whats" onclick="enviarPedido()">Finalizar no WhatsApp</div>
</div>

<div class="whatsapp" onclick="abrirWhats()">💬</div>
<div class="topo" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>

<script>
let produtoAtual = {}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'})
}

function abrirModal(nome,img,desc,preco){
  produtoAtual = {nome,img,desc,preco}

  document.getElementById("modal").classList.add("active")
  document.getElementById("modalNome").innerText = nome
  document.getElementById("modalDesc").innerText = desc
  document.getElementById("modalImg").src = img
}

function enviarPedido(){
  let nome = document.getElementById("nome").value
  let end = document.getElementById("endereco").value
  let pag = document.getElementById("pagamento").value

  let msg = `Pedido:%0A${produtoAtual.nome}%0A${produtoAtual.desc}%0A`
  msg += `Cliente: ${nome}%0AEndereço: ${end}%0APagamento: ${pag}`

  window.open(`https://wa.me/553183209688?text=${msg}`)
}

function abrirWhats(){
  window.open(`https://wa.me/553183209688`)
}
</script>

</body>
</html>
